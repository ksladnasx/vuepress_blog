<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>下拉刷新 & 上拉加载演示 | 模拟随机数据</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f5f7fb;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 头部导航区 (固定) */
        .app-header {
            background-color: #ffffff;
            padding: 14px 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
            border-bottom: 1px solid #eef2f6;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .app-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e2a5e, #2a4b7c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .app-header p {
            font-size: 0.75rem;
            color: #6c7a8e;
            margin-top: 4px;
        }

        /* 滚动容器: 负责滚动 + 下拉刷新区域 */
        .scroll-container {
            flex: 1;
            overflow-y: auto;
            overscroll-behavior: contain;
            scroll-behavior: smooth;
            position: relative;
        }

        /* 下拉刷新指示器区域 (动态改变高度) */
        .pull-refresh {
            width: 100%;
            overflow: hidden;
            height: 0;
            transition: height 0.2s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8fafd;
            color: #4b6b8f;
            font-size: 0.85rem;
            gap: 8px;
        }

        .refresh-content {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 0;
        }

        .refresh-icon {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #b9cdff;
            border-top-color: #2a6df4;
            animation: spin 0.8s linear infinite;
        }

        .refresh-text {
            font-weight: 500;
        }

        /* 列表容器 - 卡片列表 */
        .feed-list {
            background-color: #f5f7fb;
            padding: 8px 12px 20px 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 卡片样式 */
        .card-item {
            background: white;
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.03);
            transition: all 0.2s;
            border: 1px solid #eef2f8;
            display: flex;
            gap: 14px;
            align-items: flex-start;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(145deg, #eef2fc, #e2e9f5);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02), 0 2px 4px rgba(0,0,0,0.02);
            flex-shrink: 0;
        }

        .card-content {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 1rem;
            color: #1a2634;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 6px;
        }

        .badge {
            background: #eef3ff;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 20px;
            color: #2a6df4;
            font-weight: 500;
        }

        .message {
            font-size: 0.88rem;
            line-height: 1.4;
            color: #2c3e44;
            margin-top: 4px;
            word-break: break-word;
        }

        .meta {
            margin-top: 10px;
            font-size: 0.7rem;
            color: #8d9bb0;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* 底部加载更多区域 */
        .load-more-trigger {
            text-align: center;
            padding: 16px 20px 24px;
            font-size: 0.8rem;
            color: #6f7d95;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: #f5f7fb;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid #cbdbe0;
            border-top-color: #2a6df4;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 空状态 / 加载占位 */
        .empty-placeholder {
            text-align: center;
            padding: 48px 24px;
            color: #8e9db2;
            background: #fafcff;
            border-radius: 32px;
            font-size: 0.9rem;
        }

        /* 禁用交互轻微提示 */
        .refreshing-active, .loading-active {
            pointer-events: none;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="app-header">
    <h1>✨ 随享流</h1>
    <p>下拉刷新 · 上拉加载更多 | 数据随机生成</p>
</div>

<!-- 滚动区域：同时管理下拉刷新 + 上拉加载 -->
<div class="scroll-container" id="scrollContainer">
    <!-- 下拉刷新动态条 (高度变化实现拖动反馈) -->
    <div class="pull-refresh" id="pullRefreshBar">
        <div class="refresh-content" id="refreshContent">
            <span class="refresh-icon" id="refreshIcon"></span>
            <span class="refresh-text" id="refreshText">下拉刷新</span>
        </div>
    </div>

    <!-- 列表区域 -->
    <div class="feed-list" id="feedList">
        <!-- 动态卡片会通过js渲染 -->
        <div class="empty-placeholder">加载中...</div>
    </div>

    <!-- 底部加载更多UI -->
    <div class="load-more-trigger" id="loadMoreTrigger">
        <span class="load-text" id="loadMoreText">上拉加载更多</span>
    </div>
</div>

<script>
    // ----------------------------- 随机数据生成模块 -----------------------------
    // 随机名字库
    const firstNames = ["陈", "林", "张", "李", "王", "刘", "吴", "周", "徐", "孙", "赵", "黄", "郭", "马", "高"];
    const lastNames = ["明远", "思琪", "梓涵", "一诺", "子轩", "雨桐", "宇航", "欣怡", "铭泽", "若溪", "乐怡", "昊然", "晨曦", "俊宇", "子涵"];
    const actions = ["分享了一首歌", "发表了想法", "打卡了", "推荐好物", "提问", "记录生活", "分享了观点", "觉得不错", "转发了内容"];
    const messages = [
        "今天天气真好，适合出门走走 🌞", "学习新技能的感觉太棒了！", "发现一家超棒的小店，推荐给大家～",
        "这本书真的值得一读再读 📖", "生活需要一点仪式感 ✨", "咖啡和雨天最配啦 ☕", 
        "坚持运动第30天，状态越来越好💪", "和朋友们的聚会太开心了", "AI 真的在改变世界", 
        "突然想听老歌，时光好快", "学会与自己和解，温柔而坚定", "保持好奇心，永远年轻"
    ];
    const emojis = ["🐱", "🐶", "🍉", "🌸", "⭐", "🔥", "💡", "🎧", "📷", "🏀", "⚡", "🍀"];

    // 随机整数
    function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // 生成随机姓名
    function randomName() {
        const firstName = firstNames[Math.floor(Math.random() * firstNames.length)];
        const lastName = lastNames[Math.floor(Math.random() * lastNames.length)];
        return firstName + lastName;
    }

    // 生成一条随机动态数据
    function generateRandomItem(indexOffset = 0, useCustomId = false) {
        const name = randomName();
        const action = actions[Math.floor(Math.random() * actions.length)];
        const msg = messages[Math.floor(Math.random() * messages.length)];
        const emoji = emojis[Math.floor(Math.random() * emojis.length)];
        // 随机时间 (最近2小时内)
        const hour = randomInt(0, 23);
        const minute = randomInt(10, 59);
        const timeStr = `${hour.toString().padStart(2,'0')}:${minute.toString().padStart(2,'0')}`;
        // 随机点赞数
        const likes = randomInt(2, 128);
        const comments = randomInt(0, 42);
        return {
            id: useCustomId ? `${Date.now()}-${Math.random()}-${indexOffset}` : `${Date.now()}-${Math.random()}`,
            userName: name,
            action: action,
            content: msg,
            emoji: emoji,
            time: `今天 ${timeStr}`,
            likes: likes,
            comments: comments,
        };
    }

    // 批量生成多条数据 (数量 count)
    function generateBatch(count, startIdx = 0) {
        const batch = [];
        for (let i = 0; i < count; i++) {
            batch.push(generateRandomItem(startIdx + i));
        }
        return batch;
    }

    // ----------------------------- 列表 & UI 核心逻辑 -----------------------------
    // DOM 元素
    const scrollContainer = document.getElementById('scrollContainer');
    const feedListEl = document.getElementById('feedList');
    const pullRefreshBar = document.getElementById('pullRefreshBar');
    const refreshTextSpan = document.getElementById('refreshText');
    const refreshIconSpan = document.getElementById('refreshIcon');
    const loadMoreTrigger = document.getElementById('loadMoreTrigger');
    const loadMoreText = document.getElementById('loadMoreText');

    // 数据仓库 (存储当前所有列表项)
    let allItems = [];          // 存储数据对象
    let isLoadingMore = false;  // 上拉加载锁
    let isRefreshing = false;   // 下拉刷新锁
    let hasMore = true;         // 是否还有更多数据 (模拟无限制上拉，但为了演示优雅，最多可设到100条? 演示不用设上限，但展示提示)
    // 为了演示体验，我们不设置硬上限，但为了让"加载更多"不会永远加载，可加载超过200条后提示已加载很多，但依然模拟数据。可选每次加载后检查长度，但不用特意限制
    // 但是为了避免无限加载导致页面极端过长，可以限制最大200条，并友好提示终点。本演示设最大180条，超过则不再加载（符合大多数场景）
    const MAX_ITEMS_LIMIT = 180;
    
    // 首次加载默认数据量
    const INITIAL_COUNT = 10;
    // 每次上拉加载的数量 (5~8 随机 使体验自然)
    const getLoadMoreCount = () => randomInt(5, 8);

    // 渲染整个列表 (完全重建，用于刷新或初始化)
    function renderFullList() {
        if (!feedListEl) return;
        if (!allItems.length) {
            feedListEl.innerHTML = `<div class="empty-placeholder">✨ 暂无内容，下拉刷新试试～</div>`;
            return;
        }
        // 使用文档片段提高性能
        const fragment = document.createDocumentFragment();
        allItems.forEach((item, idx) => {
            const card = createCardElement(item, idx);
            fragment.appendChild(card);
        });
        feedListEl.innerHTML = '';
        feedListEl.appendChild(fragment);
    }

    // 仅追加新数据到列表末尾 (用于上拉加载)
    function appendItemsToEnd(newItems) {
        if (!feedListEl || !newItems.length) return;
        const fragment = document.createDocumentFragment();
        const startIndex = allItems.length - newItems.length;
        newItems.forEach((item, idx) => {
            const card = createCardElement(item, startIndex + idx);
            fragment.appendChild(card);
        });
        feedListEl.appendChild(fragment);
    }

    // 生成单个卡片DOM (复用样式)
    function createCardElement(item, idx) {
        const div = document.createElement('div');
        div.className = 'card-item';
        div.setAttribute('data-id', item.id);
        // 随机柔和边框效果可忽略
        div.innerHTML = `
            <div class="avatar">${item.emoji}</div>
            <div class="card-content">
                <div class="user-name">
                    ${escapeHtml(item.userName)} 
                    <span class="badge">${escapeHtml(item.action)}</span>
                </div>
                <div class="message">${escapeHtml(item.content)}</div>
                <div class="meta">
                    <span>🕒 ${escapeHtml(item.time)}</span>
                    <span>❤️ ${item.likes}</span>
                    <span>💬 ${item.comments}</span>
                </div>
            </div>
        `;
        return div;
    }

    // 简单的防XSS辅助
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // 更新底部加载更多UI状态
    function updateLoadMoreUI(isLoading, hasData = true) {
        if (isLoading) {
            loadMoreText.innerHTML = '<span class="spinner"></span> 加载中...';
            loadMoreText.style.opacity = '0.8';
        } else {
            if (!hasData || allItems.length >= MAX_ITEMS_LIMIT) {
                loadMoreText.innerHTML = '✨ 已经到底啦 ✨';
                loadMoreText.style.opacity = '0.7';
                hasMore = false;
            } else {
                loadMoreText.innerHTML = '⬆️ 上拉加载更多 ⬆️';
                loadMoreText.style.opacity = '1';
                hasMore = true;
            }
        }
    }

    // 重置下拉刷新指示器的高度 & 文字 (恢复默认)
    function resetPullRefreshBar() {
        pullRefreshBar.style.height = '0px';
        // 重置图标样式：无动画
        if (refreshIconSpan) refreshIconSpan.className = 'refresh-icon';
        if (refreshTextSpan) refreshTextSpan.innerText = '下拉刷新';
    }

    // 执行刷新操作 (清空重新生成初始数据)
    async function performRefresh() {
        if (isRefreshing || isLoadingMore) return;
        isRefreshing = true;
        // 显示刷新状态: 改变刷新条状态为刷新中
        pullRefreshBar.style.height = '56px';
        if (refreshTextSpan) refreshTextSpan.innerText = '刷新中...';
        if (refreshIconSpan) refreshIconSpan.className = 'refresh-icon';
        
        // 模拟网络延迟 + 生成全新数据
        await delay(600);
        
        // 生成全新10条初始随机数据
        const newData = generateBatch(INITIAL_COUNT);
        allItems = [...newData];
        hasMore = true;   // 重置上拉限制
        // 重新渲染整个列表
        renderFullList();
        // 重置底部加载状态
        updateLoadMoreUI(false, allItems.length < MAX_ITEMS_LIMIT);
        
        // 刷新完成后平滑重置刷新条
        await delay(200);
        resetPullRefreshBar();
        isRefreshing = false;
        // 额外通知：滚动容器重新调整后若还在顶部，无影响
    }

    // 加载更多数据 (模拟上拉追加)
    async function loadMoreData() {
        if (isLoadingMore || isRefreshing) {
            return;
        }
        // 边界判断：如果没有更多数据或者超过最大限制就不再请求
        if (!hasMore || allItems.length >= MAX_ITEMS_LIMIT) {
            updateLoadMoreUI(false, false);
            return;
        }
        
        isLoadingMore = true;
        updateLoadMoreUI(true, true);
        
        // 模拟网络请求延迟
        await delay(500);
        
        // 随机生成新一批数据 (5~8条)
        const addCount = getLoadMoreCount();
        // 若加上去后超出最大限制，则限制只添加到MAX_ITEMS_LIMIT
        let actualAddCount = addCount;
        if (allItems.length + addCount > MAX_ITEMS_LIMIT) {
            actualAddCount = MAX_ITEMS_LIMIT - allItems.length;
            if (actualAddCount <= 0) {
                // 没有更多空间
                updateLoadMoreUI(false, false);
                isLoadingMore = false;
                return;
            }
        }
        
        const newItems = generateBatch(actualAddCount, allItems.length);
        // 追加到数据仓库
        allItems.push(...newItems);
        // 只追加新卡片DOM（提高滚动体验）
        appendItemsToEnd(newItems);
        
        // 检查是否达到上限
        const nowReachLimit = allItems.length >= MAX_ITEMS_LIMIT;
        if (nowReachLimit) {
            hasMore = false;
            updateLoadMoreUI(false, false);
        } else {
            updateLoadMoreUI(false, true);
        }
        
        isLoadingMore = false;
    }

    // 延迟工具
    function delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    // ----------------------------- 下拉刷新手势 (触摸控制) -----------------------------
    // 变量记录下拉相关状态
    let touchStartY = 0;
    let startScrollTop = 0;
    let isPulling = false;         // 是否正在下拉拖拽中
    let pullThreshold = 60;        // 阈值(px) 显示释放刷新
    let refreshBarMaxHeight = 70;  // 最大下拉高度
    let hasReachedThreshold = false; // 用于文字反馈
    
    // 监听touchstart
    function onTouchStart(e) {
        if (isRefreshing) return;
        const touch = e.touches[0]; // 记录初始触摸位置和滚动位置
        // console.log('touchstart Y:', touch.clientY)
        touchStartY = touch.clientY;
        startScrollTop = scrollContainer.scrollTop;
        isPulling = false;
        hasReachedThreshold = false;
    }
    
    function onTouchMove(e) {
        if (isRefreshing || isLoadingMore) return;
        const currentY = e.touches[0].clientY;  // 触摸移动时当前触摸点的Y坐标
        // console.log(e.touches[0].clientY)
        const deltaY = currentY - touchStartY;    // 计算下拉移动距离，正值表示向下拉动，负值表示向上
        const currentScrollTop = scrollContainer.scrollTop;  //表示该元素的滚动条距离其顶部边缘的垂直滚动距离
        
        // 关键: 只有在滚动容器顶部 (scrollTop <= 0) 并且下拉移动距离 > 0 才触发下拉刷新效果
        if (currentScrollTop <= 0 && deltaY > 0 && !isRefreshing) {
            // 阻止页面默认滚动 (实现下拉阻尼效果)
            e.preventDefault();
            // 计算新的下拉高度 (限制最大高度)
            let newHeight = Math.min(deltaY * 0.8, refreshBarMaxHeight);
            if (newHeight < 0) newHeight = 0;
            pullRefreshBar.style.height = `${newHeight}px`;
            
            // 根据高度和阈值改变文案和图标
            if (newHeight >= pullThreshold) {
                if (!hasReachedThreshold) {
                    refreshTextSpan.innerText = '释放刷新';
                    // 改变图标样式: 增加旋转前提示
                    refreshIconSpan.style.transform = 'rotate(180deg)';
                    refreshIconSpan.style.transition = 'transform 0.2s';
                    hasReachedThreshold = true;
                }
            } else {
                if (hasReachedThreshold) {
                    refreshTextSpan.innerText = '下拉刷新';
                    refreshIconSpan.style.transform = 'rotate(0deg)';
                    hasReachedThreshold = false;
                } else if (newHeight > 5) {
                    refreshTextSpan.innerText = '下拉刷新';
                }
            }
            isPulling = true;
        } else {
            // 非顶部或下拉方向不对，若之前正在pull但条件不满足? 保证重置不干扰
            if (isPulling && currentScrollTop > 0) {
                // 滚动了就复位
                resetPullRefreshBar();
                isPulling = false;
            }
        }
    }
    
    function onTouchEnd(e) {
        if (isRefreshing) {
            resetPullRefreshBar();
            return;
        }
        // 判断当前下拉高度是否超过阈值
        const currentHeight = parseInt(pullRefreshBar.style.height, 10);
        if (isPulling && currentHeight >= pullThreshold && !isRefreshing && !isLoadingMore) {
            // 执行刷新
            performRefresh().then(() => {
                // 彻底重置刷新条
                resetPullRefreshBar();
                isPulling = false;
                hasReachedThreshold = false;
                if(refreshIconSpan) refreshIconSpan.style.transform = '';
            }).catch(()=>{
                resetPullRefreshBar();
                isPulling = false;
            });
        } else {
            // 未超过阈值，平滑归零
            resetPullRefreshBar();
            isPulling = false;
            hasReachedThreshold = false;
            if(refreshIconSpan) refreshIconSpan.style.transform = '';
        }
        touchStartY = 0;
        startScrollTop = 0;
    }
    
    // ----------------------------- 上拉加载监听(滚动事件) -----------------------------
    let scrollTimer = null;
    function onScrollHandler() {
        if (isLoadingMore || isRefreshing) return;
        // 防抖处理，避免频繁触发
        if (scrollTimer) clearTimeout(scrollTimer);
        scrollTimer = setTimeout(() => {
            const scrollTop = scrollContainer.scrollTop; //滚动容器顶部被卷起的高度，即滚动条距离顶部的垂直偏移量
            const clientHeight = scrollContainer.clientHeight;//滚动容器的可视高度，即元素内容区的高度（不包括滚动条和边框）
            const scrollHeight = scrollContainer.scrollHeight;//滚动容器的内容高度，即元素内容区的总高度（包括被卷起的不可见部分）
            // 距离底部小于 30px 时，即滚动容器还剩30px以下的内容还没显示的时候且必须还有更多数据且 未锁定状态才触发加载更多
            if (scrollHeight - scrollTop - clientHeight <= 30 && !isLoadingMore && !isRefreshing && hasMore && allItems.length < MAX_ITEMS_LIMIT) {
                loadMoreData();
            } else if (allItems.length >= MAX_ITEMS_LIMIT && hasMore) {
                // 如果已达上限，更新底部文案
                hasMore = false;
                updateLoadMoreUI(false, false);
            }
        }, 50);
    }
    
    // 初始化滚动容器边缘检测: 手动调用适应内容初始加载
    function initEventListeners() {
        scrollContainer.addEventListener('touchstart', onTouchStart, { passive: false });
        scrollContainer.addEventListener('touchmove', onTouchMove, { passive: false });
        scrollContainer.addEventListener('touchend', onTouchEnd);
        scrollContainer.addEventListener('scroll', onScrollHandler);
    }
    
    // 初始化数据
    async function init() {
        // 生成初始数据
        const initialData = generateBatch(INITIAL_COUNT);
        allItems = [...initialData];
        renderFullList();
        hasMore = true;
        updateLoadMoreUI(false, allItems.length < MAX_ITEMS_LIMIT);
        initEventListeners();
        // 额外处理下拉刷新条样式复位
        resetPullRefreshBar();
    }
    
    // 防止快速触摸滚动时多次refresh造成的冲突，增加一些样式锁指示器
    // 监听刷新和加载时候添加disable类以微调交互
    function watchGlobalLocks() {
        setInterval(() => {
            if (isRefreshing) {
                scrollContainer.style.overscrollBehavior = 'none';
            } else {
                scrollContainer.style.overscrollBehavior = 'contain';
            }
        }, 200);
    }
    
    // 执行
    init();
    watchGlobalLocks();
</script>
</body>
</html>
