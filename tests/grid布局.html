<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="grid">
        <div id="a">A</div>
        <div id="b">B</div>
        <div id="c">C</div>
        <div id="d">D</div>
        <div id="e">E</div>
    </div>
    <div class="waterfall">
        <div class="card">1<br>内容少</div>
        <div class="card">2<br>内容多一些<br>多一行</div>
        <div class="card">3<br>很高很高的卡片<br><br>很多内容</div>
        <div class="card">4<br>短</div>
        <div class="card">4<br>短</div> <div class="card">3<br>很高很高的卡片<br><br>很多内容</div>
         <div class="card">3<br>很高很高的卡片<br><br>很多内容</div>
        
        <!-- 更多卡片... -->
    </div>
</body>
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        gap: 20px;
                padding-bottom: 5%;
        padding-top: 5%;
    }

    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        /* 定义两列，列线就是1，2，3*/
        grid-template-rows: auto auto;
        gap: 10px;
        height: 400px;
        min-width: 200px;
        background: #f0f0f0;
        padding: 10px;
    }

    /* */
    #a {
        grid-column: 1 / 3;
        /* 占满第一行 列线就是1-3*/
    }

    #b {
        height: 20px;
        /* 占满第二行 行线就是2-3*/
    }


    /* 为了视觉效果，加边框背景 */
    .grid>div {
        background: lightblue;
        padding: 20px;
        border: 1px solid #333;
    }



    .waterfall {
        column-count: 2;
        /* 两列瀑布 */
        column-gap: 16px;
        /* 列间距 */
        max-width: 400px;

 
    }

    .card {
        break-inside: avoid;
        /* 防止卡片被截断到两列 */
        margin-bottom: 16px;
        background: #f0f0f0;
        border-radius: 12px;
        padding: 16px;
    }
</style>

</html>
