<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>
    </p>
</body>
<style>
p::before {content:"第一章：";}
p::after {content:"Hot!";}
p::first-line {background:red;}
/* 选中第一个字符 */
p::first-letter {font-size:30px;color: black;} 
/* 伪类选择器，对p标签的第一个子元素，这里指的是前面加的伪元素 */
p:first-child {color: rgb(10, 255, 181)}  
</style>
</html>
